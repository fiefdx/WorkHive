<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Workspaces - WorkHive</title>
  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../../index.html" class="site-logo">Work<span>Hive</span></a>
      <nav class="main-nav">
        <ul>
          <li><a href="search.html">Search Workspaces</a></li>
          <li><span class="user-greeting">Welcome, Coworker</span></li>
          <li><a href="javascript:void(0)" onclick="handleLogout(); return false;">Log Out</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-wrapper">

    <h1 class="page-title">Find a Workspace</h1>
    <p class="page-subtitle">Search and browse available workspaces</p>

    <div class="search-filters">
      <h3>Search Filters</h3>

      <div class="filter-grid">
        <!-- Address / Neighborhood -->
        <div class="form-group">
          <label for="searchAddress">Address / Neighborhood</label>
          <input type="text" id="searchAddress" placeholder="e.g., Downtown">
        </div>

        <!-- Seating Capacity -->
        <div class="form-group">
          <label for="minCapacity">Min. Seating Capacity</label>
          <input type="number" id="minCapacity" placeholder="1" min="1">
        </div>

        <!-- Lease Term -->
        <div class="form-group">
          <label for="leaseTerm">Lease Term</label>
          <select id="leaseTerm">
            <option value="">Any</option>
            <option value="day">Day</option>
            <option value="week">Week</option>
            <option value="month">Month</option>
          </select>
        </div>

        <!-- Min Price -->
        <div class="form-group">
          <label for="minPrice">Min. Price ($)</label>
          <input type="number" id="minPrice" placeholder="0" min="0">
        </div>

        <!-- Max Price -->
        <div class="form-group">
          <label for="maxPrice">Max. Price ($)</label>
          <input type="number" id="maxPrice" placeholder="1000" min="0">
        </div>

        <!-- Availability Date -->
        <div class="form-group">
          <label for="availDate">Available From</label>
          <input type="date" id="availDate">
        </div>
      </div>

      <!-- Checkboxes for boolean filters -->
      <div style="display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap;">
        <div class="checkbox-group">
          <input type="checkbox" id="filterParking">
          <label for="filterParking">Has Parking</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="filterTransit">
          <label for="filterTransit">Public Transit</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="filterSmoking">
          <label for="filterSmoking">Smoking Allowed</label>
        </div>
      </div>

      <div class="filter-actions">
        <button id="resetBtn" class="btn" style="background: #eee; color: #333;">Reset</button>
        <button id="searchBtn" class="btn btn-primary" style="width: auto;">Search</button>
      </div>
    </div>

    <!-- Results area -->
    <div id="resultsInfo" style="margin-bottom: 16px; font-size: 14px; color: #666;">
      Showing <strong>0</strong> workspaces
    </div>

    <div id="resultsContainer" class="cards-grid">
      <!-- Will be populated by JavaScript -->
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 WorkHive. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="../data/data.js"></script>

  <script>
    // Require login on this page
    document.addEventListener('DOMContentLoaded', function() {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = '../../auth/login.html';
        return;
      }
      
      // Ensure demo data is loaded before searching
      if (workspaces.length === 0) {
        console.log('Loading demo data...');
        loadDemoData();
      }
      
      console.log('Workspaces available:', workspaces.length);
      
      // Initial search to show all workspaces
      performSearch();
    });

    document.getElementById('searchBtn').addEventListener('click', function() {
      performSearch();
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      // Reset all filters
      document.getElementById('searchAddress').value = '';
      document.getElementById('minCapacity').value = '';
      document.getElementById('leaseTerm').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      document.getElementById('availDate').value = '';
      document.getElementById('filterParking').checked = false;
      document.getElementById('filterTransit').checked = false;
      document.getElementById('filterSmoking').checked = false;
      
      // Perform search with empty filters
      performSearch();
    });

    // Perform search with current filter values
    function performSearch() {
      // Ensure demo data is loaded
      if (workspaces.length === 0) {
        loadDemoData();
      }
      
      console.log('Total workspaces in data:', workspaces.length);
      
      // Collect filter values
      const filters = {
        address: document.getElementById('searchAddress').value,
        minCapacity: document.getElementById('minCapacity').value,
        leaseTerm: document.getElementById('leaseTerm').value,
        minPrice: document.getElementById('minPrice').value,
        maxPrice: document.getElementById('maxPrice').value,
        availDate: document.getElementById('availDate').value,
        hasParking: document.getElementById('filterParking').checked,
        hasTransit: document.getElementById('filterTransit').checked,
        smokingAllowed: document.getElementById('filterSmoking').checked
      };
      
      console.log('Search filters:', filters);
      const results = filterWorkspaces(filters);
      console.log('Filtered results count:', results.length);
      
      // Enrich results with property and owner data for display
      const enrichedResults = results.map(w => enrichWorkspaceWithProperty(w)).filter(w => w !== null);
      
      console.log('Enriched results count:', enrichedResults.length);
      
      displayResults(enrichedResults);
    }

    // Display search results as cards
    function displayResults(workspaces) {
      const container = document.getElementById('resultsContainer');
      const info = document.getElementById('resultsInfo');
      
      // Update results count
      info.innerHTML = `Showing <strong>${workspaces.length}</strong> workspace${workspaces.length !== 1 ? 's' : ''}`;
      
      if (workspaces.length === 0) {
        container.innerHTML = `
          <div class="dashboard-empty" style="grid-column: 1/-1;">
            <div class="empty-icon">&#128269;</div>
            <p>No workspaces found matching your criteria.</p>
            <button id="resetFiltersBtn" class="btn btn-secondary" style="margin-top: 12px;">Reset Filters</button>
          </div>
        `;
        document.getElementById('resetFiltersBtn').addEventListener('click', function() {
          document.getElementById('resetBtn').click();
        });
        return;
      }
      
      container.innerHTML = workspaces.map(w => {
        const property = w.property;
        const leaseTermText = w.leaseTerm.charAt(0).toUpperCase() + w.leaseTerm.slice(1);
        
        return `
          <div class="card">
            <div class="card-image-placeholder">Workspace Photo</div>
            <div class="card-body">
              <h4>
                <a href="workspace/details.html?id=${w.id}" style="color: inherit; text-decoration: none;">
                  ${escapeHtml(w.type.charAt(0).toUpperCase() + w.type.slice(1))}
                </a>
              </h4>
              <div class="card-meta">&#128205; ${escapeHtml(property.address)}, ${escapeHtml(property.neighborhood)}</div>
              <div class="card-meta">&#128200; ${property.squareFeet.toLocaleString()} sq ft property</div>
              <div class="card-meta">
                <span class="badge badge-blue">${escapeHtml(w.type.charAt(0).toUpperCase() + w.type.slice(1))}</span>
                <span class="badge badge-gray">Seats: ${w.seatingCapacity}</span>
              </div>
              <div class="card-meta">
                ${w.smokingAllowed ? '<span class="badge badge-gray">Smoking allowed</span> ' : '<span class="badge badge-green">Non-smoking</span> '}
                ${property.hasParking ? '<span class="badge badge-blue">Parking</span> ' : ''}
                ${property.hasPublicTransit ? '<span class="badge badge-blue">Transit</span>' : ''}
              </div>
              <div class="card-price">$${w.price} <span>/ ${leaseTermText.toLowerCase()}</span></div>
            </div>
            <div class="card-actions">
              <a href="workspace/details.html?id=${w.id}" class="btn btn-secondary btn-sm" style="width: 100%;">View Details</a>
            </div>
          </div>
        `;
      }).join('');
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

</body>
</html>
