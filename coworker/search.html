<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Workspaces - WorkHive</title>
  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../../index.html" class="site-logo">Work<span>Hive</span></a>
      <nav class="main-nav">
        <ul>
          <li><a href="search.html">Search Workspaces</a></li>
          <li><span class="user-greeting">Welcome, Coworker</span></li>
          <li><a href="javascript:void(0)" onclick="handleLogout(); return false;">Log Out</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-wrapper">

    <h1 class="page-title">Find a Workspace</h1>
    <p class="page-subtitle">Search and browse available workspaces</p>

    <div class="search-filters">
      <h3>Search Filters</h3>

      <div class="filter-grid">
        <!-- Address / Neighborhood -->
        <div class="form-group">
          <label for="searchAddress">Address / Neighborhood</label>
          <input type="text" id="searchAddress" placeholder="e.g., Downtown">
        </div>

        <!-- Seating Capacity -->
        <div class="form-group">
          <label for="minCapacity">Min. Seating Capacity</label>
          <input type="number" id="minCapacity" placeholder="1" min="1">
        </div>

        <!-- Lease Term -->
        <div class="form-group">
          <label for="leaseTerm">Lease Term</label>
          <select id="leaseTerm">
            <option value="">Any</option>
            <option value="day">Day</option>
            <option value="week">Week</option>
            <option value="month">Month</option>
          </select>
        </div>

        <!-- Min Price -->
        <div class="form-group">
          <label for="minPrice">Min. Price ($)</label>
          <input type="number" id="minPrice" placeholder="0" min="0">
        </div>

        <!-- Max Price -->
        <div class="form-group">
          <label for="maxPrice">Max. Price ($)</label>
          <input type="number" id="maxPrice" placeholder="1000" min="0">
        </div>

        <!-- Availability Date -->
        <div class="form-group">
          <label for="availDate">Available From</label>
          <input type="date" id="availDate">
        </div>
      </div>

      <!-- Checkboxes for boolean filters -->
      <div style="display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap;">
        <div class="checkbox-group">
          <input type="checkbox" id="filterParking">
          <label for="filterParking">Has Parking</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="filterTransit">
          <label for="filterTransit">Public Transit</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="filterSmoking">
          <label for="filterSmoking">Smoking Allowed</label>
        </div>
      </div>

      <div class="filter-actions">
        <button id="resetBtn" class="btn" style="background: #eee; color: #333;">Reset</button>
        <button id="searchBtn" class="btn btn-primary" style="width: auto;">Search</button>
      </div>
    </div>

    <!-- Results area -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div id="resultsInfo" style="font-size: 14px; color: #666;">
        Showing <strong>0</strong> workspaces
      </div>
      
      <!-- Sorting controls -->
      <div style="display: flex; gap: 12px; align-items: center;">
        <label for="sortBy" style="font-size: 14px; color: #666; margin: 0;">Sort by:</label>
        <select id="sortBy" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
          <option value="createdAt">Newest First</option>
          <option value="price">Price (Low to High)</option>
          <option value="price" data-order="desc">Price (High to Low)</option>
          <option value="rating">Highest Rated</option>
          <option value="availability">Earliest Availability</option>
          <option value="availability" data-order="desc">Latest Availability</option>
        </select>
        <button id="applySortBtn" class="btn btn-primary" style="width: auto; padding: 8px 16px; font-size: 14px;">Apply</button>
      </div>
    </div>

    <div id="resultsContainer" class="cards-grid">
      <!-- Will be populated by JavaScript -->
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 WorkHive. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    // Require login on this page
    document.addEventListener('DOMContentLoaded', function() {
      const user = getCurrentUser();
      if (!user) {
        window.location.href = '../../auth/login.html';
        return;
      }
      
      // Initial search to show all workspaces
      performSearch();
    });

    document.getElementById('searchBtn').addEventListener('click', function() {
      performSearch();
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      // Reset all filters
      document.getElementById('searchAddress').value = '';
      document.getElementById('minCapacity').value = '';
      document.getElementById('leaseTerm').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      document.getElementById('availDate').value = '';
      document.getElementById('filterParking').checked = false;
      document.getElementById('filterTransit').checked = false;
      document.getElementById('filterSmoking').checked = false;
      document.getElementById('sortBy').value = 'createdAt';
      
      // Perform search with empty filters
      performSearch();
    });
    
    // Apply sorting
    document.getElementById('applySortBtn').addEventListener('click', function() {
      performSearch();
    });

    // Perform search with current filter values using API
    async function performSearch() {
      console.log('Performing search...');
      
      // Collect filter values
      const filters = {};
      
      const address = document.getElementById('searchAddress').value;
      if (address) filters.neighborhood = address;
      
      const minCapacity = document.getElementById('minCapacity').value;
      if (minCapacity) filters.minSeatingCapacity = minCapacity;
      
      const leaseTerm = document.getElementById('leaseTerm').value;
      if (leaseTerm) filters.leaseTerm = leaseTerm;
      
      const minPrice = document.getElementById('minPrice').value;
      if (minPrice) filters.minPrice = minPrice;
      
      const maxPrice = document.getElementById('maxPrice').value;
      if (maxPrice) filters.maxPrice = maxPrice;
      
      const availDate = document.getElementById('availDate').value;
      if (availDate) filters.availabilityDate = availDate;
      
      const hasParking = document.getElementById('filterParking').checked;
      if (hasParking) filters.hasParking = true;
      
      const hasTransit = document.getElementById('filterTransit').checked;
      if (hasTransit) filters.hasPublicTransit = true;
      
      const smokingAllowed = document.getElementById('filterSmoking').checked;
      if (smokingAllowed) filters.smokingAllowed = true;
      
      // Collect sorting values
      const sortBySelect = document.getElementById('sortBy');
      const sortBy = sortBySelect.value;
      const sortOption = sortBySelect.options[sortBySelect.selectedIndex];
      const sortOrder = sortOption.getAttribute('data-order') || 'asc';
      
      // Add sorting to filters
      filters.sortBy = sortBy;
      filters.order = sortOrder;
      
      console.log('Search filters:', filters);
      
      // Call API to search workspaces
      const result = await searchWorkspaces(filters);
      
      console.log('Search result:', result);
      
      if (result.success) {
        displayResults(result.workspaces);
      } else {
        displayResults([]);
        document.getElementById('resultsContainer').innerHTML = `
          <div class="dashboard-empty" style="grid-column: 1/-1;">
            <div class="empty-icon">&#128269;</div>
            <p>Error loading workspaces: ${result.message}</p>
          </div>
        `;
      }
    }

    // Display search results as cards
    function displayResults(workspaces) {
      const container = document.getElementById('resultsContainer');
      const info = document.getElementById('resultsInfo');
      
      // Update results count
      info.innerHTML = `Showing <strong>${workspaces.length}</strong> workspace${workspaces.length !== 1 ? 's' : ''}`;
      
      if (workspaces.length === 0) {
        container.innerHTML = `
          <div class="dashboard-empty" style="grid-column: 1/-1;">
            <div class="empty-icon">&#128269;</div>
            <p>No workspaces found matching your criteria.</p>
            <button id="resetFiltersBtn" class="btn btn-secondary" style="margin-top: 12px;">Reset Filters</button>
          </div>
        `;
        document.getElementById('resetFiltersBtn').addEventListener('click', function() {
          document.getElementById('resetBtn').click();
        });
        return;
      }
      
      container.innerHTML = workspaces.map(w => {
        const property = w.propertyId || {};
        const leaseTermText = w.leaseTerm.charAt(0).toUpperCase() + w.leaseTerm.slice(1);
        const photos = w.photos || [];
        const mainImage = photos && photos.length > 0 ? photos[0].url : null;
        const rating = w.averageRating || 0;
        const ratingCount = w.ratingCount || 0;
        
        // Generate star rating display
        let starHtml = '';
        for (let i = 0; i < 5; i++) {
          starHtml += i < Math.round(rating) ? '&#9733;' : '&#9734;';
        }
        
        return `
          <div class="card">
            <div style="width: 100%; height: 200px; overflow: hidden; border-radius: 8px 8px 0 0;">
              ${mainImage ? `
                <img src="${API_BASE_URL.replace('/api', '')}${mainImage}" style="width: 100%; height: 100%; object-fit: cover;">
              ` : `
                <div class="card-image-placeholder">Workspace Photo</div>
              `}
            </div>
            <div class="card-body">
              <h4>
                <a href="workspace/details.html?id=${w._id}" style="color: inherit; text-decoration: none;">
                  ${escapeHtml(w.type.charAt(0).toUpperCase() + w.type.slice(1))}
                </a>
              </h4>
              <div class="card-meta">&#128205; ${escapeHtml(property.address || 'N/A')}, ${escapeHtml(property.neighborhood || 'N/A')}</div>
              <div class="card-meta">&#128200; ${property.squareFeet ? property.squareFeet.toLocaleString() : 'N/A'} sq ft property</div>
              <div class="card-meta">
                <span class="badge badge-blue">${escapeHtml(w.type.charAt(0).toUpperCase() + w.type.slice(1))}</span>
                <span class="badge badge-gray">Seats: ${w.seatingCapacity}</span>
              </div>
              <div class="card-meta">
                ${w.smokingAllowed ? '<span class="badge badge-gray">Smoking allowed</span> ' : '<span class="badge badge-green">Non-smoking</span> '}
                ${property.hasParking ? '<span class="badge badge-blue">Parking</span> ' : ''}
                ${property.hasPublicTransit ? '<span class="badge badge-blue">Transit</span>' : ''}
              </div>
              ${rating > 0 ? `
                <div class="card-meta" style="font-size: 14px; color: #666;">
                  <span style="color: #ffc107; font-size: 16px;">${starHtml}</span>
                  <span style="margin-left: 4px;">${rating.toFixed(1)} (${ratingCount})</span>
                </div>
              ` : ''}
              <div class="card-price">$${w.price} <span>/ ${leaseTermText.toLowerCase()}</span></div>
            </div>
            <div class="card-actions">
              <a href="workspace/details.html?id=${w._id}" class="btn btn-secondary btn-sm" style="width: 100%;">View Details</a>
            </div>
          </div>
        `;
      }).join('');
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>

</body>
</html>
