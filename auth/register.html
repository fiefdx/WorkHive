<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - WorkHive</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- HEADER  -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-logo">Work<span>Hive</span></a>
      <nav class="main-nav">
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="login.html">Log In</a></li>
          <li><a href="register.html">Sign Up</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="page-wrapper">

    <div class="auth-card">
      <h2>Create Your Account</h2>

      <form id="registerForm">

        <!-- Success/Error message area -->
        <div id="registerMessage"></div>

        <!-- Role Selection -->
        <div class="role-selector">
          <div class="role-option selected" data-role="coworker" onclick="selectRole(this)">
            <span class="role-icon">&#128187;</span>
            Coworker
          </div>
          <div class="role-option" data-role="owner" onclick="selectRole(this)">
            <span class="role-icon">&#127968;</span>
            Owner
          </div>
        </div>
        <input type="hidden" id="role" name="role" value="coworker">

        <!-- First Name -->
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required>
        </div>

        <!-- Middle Name (Optional) -->
        <div class="form-group">
          <label for="middleName">Middle Name <span class="optional">(optional)</span></label>
          <input type="text" id="middleName" name="middleName" placeholder="Enter your middle name">
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" name="phone" placeholder="4161234567" pattern="[0-9]{10,15}" required>
          <div class="hint">Enter 10-15 digits</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 WorkHive. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="../data/data.js"></script>
  <script>
    function selectRole(el) {
      document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('role').value = el.dataset.role;
    }
  </script>

</body>
</html>
